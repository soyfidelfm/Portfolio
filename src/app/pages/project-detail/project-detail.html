<section *ngIf="project; else notFound" class="project-detail">

  <a routerLink="/projects" class="back-link">← Back to projects</a>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-text">
      <p class="eyebrow">Featured Project</p>

      <h1>{{ project.title }}</h1>

      <p class="description">
        {{ project.description }}
      </p>

      <!-- ACTIONS -->
      <div class="actions">
        <a
          *ngIf="project.liveUrl"
          [href]="project.liveUrl"
          target="_blank"
          class="btn-primary">
          Live Demo
        </a>

        <a
          *ngIf="project.repoUrl"
          [href]="project.repoUrl"
          target="_blank"
          class="btn-secondary">
          GitHub
        </a>
      </div>
    </div>

    <!-- IMAGES -->
    <div class="carousel">
      <img
        class="main-image"
        [src]="project.images[currentImageIndex]"
        [alt]="project.title"
      />

      <div class="thumbnails">
        <img
          *ngFor="let img of project.images; let i = index"
          [src]="img"
          [alt]="project.title"
          [class.active]="i === currentImageIndex"
          (click)="selectImage(i)"
        />
      </div>
    </div>
  </div>

  <!-- 🧠 OVERVIEW -->
  <div class="section">
    <h3 class="subtitle">Overview</h3>
    <p>{{ project.overview }}</p>
  </div>

  <!-- ⚙️ FEATURES -->
  <div class="impact-section">
    <h3 class="subtitle">Key Features</h3>

    <ul class="impact-list">
      <li *ngFor="let item of project.impact">
        {{ item }}
      </li>
    </ul>
  </div>

  <!-- 🧱 ARCHITECTURE -->
  <div class="section">
    <h3 class="subtitle">Architecture</h3>
    <p>{{ project.architecture }}</p>
  </div>

  <!-- 📈 IMPACT -->
  <div class="section">
    <h3 class="subtitle">Impact</h3>
    <p>{{ project.impactText }}</p>
  </div>

  <!-- TECH STACK -->
  <div class="tech-stack">
    <span *ngFor="let tech of project.tech">
      {{ tech }}
    </span>
  </div>

</section>

<ng-template #notFound>
  <section class="project-detail">
    <a routerLink="/" class="back-link">← Back to home</a>
    <h1>Project not found</h1>
  </section>
</ng-template>
