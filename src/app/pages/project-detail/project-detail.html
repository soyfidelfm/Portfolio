<section *ngIf="project; else notFound" class="project-detail">
  <a routerLink="/projects" class="back-link">← Back to projects</a>

  <div class="hero">
    <div>
      <p class="eyebrow">Featured Project</p>
      <h1>{{ project.title }}</h1>
      <p class="subtitle">{{ project.subtitle }}</p>
      <p class="description">{{ project.description }}</p>

      <div class="actions">
        <a *ngIf="project.demoUrl" [href]="project.demoUrl" target="_blank" class="btn-primary">
          Live Demo
        </a>

        <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank" class="btn-secondary">
          GitHub
        </a>
      </div>
    </div>

    <div class="carousel">
  <img
    class="main-image"
    [src]="project.images[currentImageIndex]"
    [alt]="project.title"
  />

  <div class="thumbnails">
    <img
      *ngFor="let img of project.images; let i = index"
      [src]="img"
      [alt]="project.title"
      [class.active]="i === currentImageIndex"
      (click)="selectImage(i)"
    />
  </div>
</div>
  </div>

  <div class="tech-stack">
    <span *ngFor="let tech of project.techStack">
      {{ tech }}
    </span>
  </div>
</section>

<ng-template #notFound>
  <section class="project-detail">
    <a routerLink="/" class="back-link">← Back to home</a>
    <h1>Project not found</h1>
  </section>
</ng-template>
